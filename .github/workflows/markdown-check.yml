name: Markdown Check

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    paths:
      - "**/*.md"

jobs:
  markdown-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List markdown files
        run: |
          find . -name "*.md" -type f | sort

      - name: Basic file check
        run: |
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f docs/project-summary.md
